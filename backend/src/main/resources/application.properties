# ── Datasource ────────────────────────────────────────────────────────────────
# Override with environment variables for production:
#   SPRING_DATASOURCE_URL      (e.g. jdbc:postgresql://host/db?sslmode=require)
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eid_cricket_fest?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&autoReconnect=true&maxReconnects=10}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# dialect is intentionally omitted — Hibernate auto-detects MySQL vs PostgreSQL
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# Render / Railway inject PORT automatically; falls back to 8080 locally
server.port=${PORT:8080}

# ── CORS ──────────────────────────────────────────────────────────────────────
# Set CORS_ALLOWED_ORIGIN to your Vercel/Netlify URL in production
cors.allowed.origins=${CORS_ALLOWED_ORIGIN:http://localhost:5173}
