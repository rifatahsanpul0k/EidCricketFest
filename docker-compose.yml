version: "3.8"
services:
  eid_cricket_mysql:
    image: mysql:8.0
    container_name: eid_cricket_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eid_cricket_fest
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 2s
